# DO NOT commit real secrets. Copy this to secret.yaml, fill in values, apply, then delete.
# kubectl apply -f k8s/app/secret.yaml
# kubectl delete -f k8s/app/secret.yaml  (or just rm the file)
apiVersion: v1
kind: Secret
metadata:
  name: loop-secrets
  namespace: loop
type: Opaque
stringData:
  DATABASE_URL: "postgresql://loop:CHANGE_ME@postgres:5432/loop"
  AUTH_SECRET: "CHANGE_ME"
  POSTGRES_USER: "loop"
  POSTGRES_PASSWORD: "CHANGE_ME"
